<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloveso BÝT</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f7f7f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
  #app{min-height:560px;width:100%;max-width:640px;background:#fff;border-radius:16px;border:1px solid #e8e8e8;display:flex;flex-direction:column;overflow:hidden}

  /* HOME */
  #screen-home{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;min-height:560px;padding:2rem}
  #screen-home h1{font-size:32px;font-weight:500}
  #screen-home h2{font-size:22px;font-weight:400;color:#666}
  #screen-home button{width:240px;padding:15px 0;font-size:18px;font-weight:500;border-radius:12px;background:#fff;border:1.5px solid #ccc;cursor:pointer;transition:background .15s}
  #screen-home button:hover{background:#f5f5f5}

  /* TRAIN */
  #screen-train{display:none;flex-direction:column;min-height:560px}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee}
  .hearts{font-size:22px;display:flex;gap:4px}
  .prog-wrap{flex:1;margin:0 14px;height:8px;background:#eee;border-radius:4px;overflow:hidden}
  .prog-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width .3s}
  #btn-repeat{background:none;border:1px solid #ccc;border-radius:8px;padding:7px 14px;font-size:14px;cursor:pointer;color:#666;font-family:inherit}
  #btn-repeat:hover{background:#f5f5f5}

  .sentence-area{padding:36px 28px 0}
  .sentence-text{font-size:22px;line-height:2.6;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
  .inline-input-wrap{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
  #ans-input{font-size:20px;font-family:inherit;padding:4px 10px;border:none;border-bottom:2px solid #bbb;background:transparent;color:#1a1a1a;outline:none;width:120px;text-align:center;transition:border-color .2s,background .2s,border-radius .2s}
  #ans-input:focus{border-bottom-color:#555}
  #ans-input.ok{border-color:#1D9E75;background:#E1F5EE;border-radius:8px}
  #ans-input.err{border-color:#E24B4A;background:#FCEBEB;border-radius:8px}
  .verb-hint{font-size:15px;color:#888;white-space:nowrap}
  .hint-btn{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 8px;border:1px solid #ccc;border-radius:8px;font-size:15px;cursor:pointer;background:#fff;color:#666;user-select:none;vertical-align:middle;white-space:nowrap;transition:background .15s;font-family:inherit}
  .hint-btn:hover{background:#f5f5f5}
  .hint-btn.open{background:#f0f0f0;color:#1a1a1a;font-weight:500}

  .transl-btn-row{padding:12px 28px 0}
  #btn-transl{font-size:22px;font-weight:400;color:#888;background:none;border:none;cursor:pointer;padding:0;text-align:left;font-family:inherit}
  #btn-transl:hover{color:#444}
  #transl-text{font-size:22px;color:#888;font-style:italic;display:none;padding:12px 28px 0}

  .action-row{display:flex;align-items:center;gap:10px;padding:18px 28px 0}
  #btn-check{padding:10px 24px;font-size:16px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;font-weight:500;font-family:inherit}
  #btn-check:hover{background:#f5f5f5}

  .feedback{min-height:24px;padding:10px 28px 0;font-size:16px;color:#666}

  /* DEAD */
  #screen-dead{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;min-height:560px;padding:2rem;text-align:center}
  #screen-dead h2{font-size:24px;font-weight:500}
  #screen-dead p{font-size:16px;color:#666;max-width:320px}
  .dead-btns{display:flex;flex-direction:column;gap:10px;width:240px}
  .dead-btns button{padding:13px;font-size:16px;border-radius:12px;border:1px solid #ccc;background:#fff;cursor:pointer;font-family:inherit}
  .dead-btns button:hover{background:#f5f5f5}

  /* DONE */
  #screen-done{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;min-height:560px;padding:2rem;text-align:center}
  #screen-done h2{font-size:24px;font-weight:500}
  #screen-done p{color:#666;font-size:16px}
  #btn-again2{padding:13px 36px;font-size:16px;border-radius:12px;border:1px solid #ccc;background:#fff;cursor:pointer;font-family:inherit}
  #btn-again2:hover{background:#f5f5f5}

  /* FORMS PANEL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99}
  #forms-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;background:#fff;border:1px solid #ddd;border-radius:14px;padding:22px 26px;width:320px;max-width:92vw;box-shadow:0 4px 32px rgba(0,0,0,.12)}
  #forms-panel h3{font-size:17px;font-weight:500;margin-bottom:14px}
  .forms-table{width:100%;border-collapse:collapse;font-size:15px}
  .forms-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
  .forms-table tr:last-child td{border-bottom:none}
  .forms-table td:first-child{color:#888;width:90px;font-size:14px}
  .forms-table td:nth-child(2){font-weight:500}
  .forms-table td:nth-child(3){color:#888}
  #btn-close-forms{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
  #forms-after-dead{display:none;margin-top:16px;padding-top:14px;border-top:1px solid #eee}
  #forms-after-dead p{font-size:14px;color:#888;margin-bottom:10px}
  #btn-to-practice{width:100%;padding:11px;font-size:15px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;font-family:inherit}
  #btn-to-practice:hover{background:#f5f5f5}
</style>
</head>
<body>
<div id="app">
  <div id="screen-home">
    <h1>Sloveso BÝT</h1>
    <h2>Jdeme na to?</h2>
    <button id="btn-start">Ano, jdeme! →</button>
  </div>

  <div id="screen-train">
    <div class="top-bar">
      <div class="hearts" id="hearts">❤️❤️❤️</div>
      <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <button id="btn-repeat">повторити</button>
    </div>
    <div class="sentence-area">
      <div class="sentence-text" id="sent-display"></div>
    </div>
    <div class="transl-btn-row">
      <button id="btn-transl">Переклад</button>
    </div>
    <div id="transl-text"></div>
    <div class="action-row">
      <button id="btn-check">Перевірити</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="screen-dead">
    <div style="font-size:52px">💔</div>
    <h2>Всі серця втрачено!</h2>
    <p>Не страшно — зупинись, повтори форми і спробуй ще раз.</p>
    <div class="dead-btns">
      <button id="btn-see-forms">Повторити форми</button>
      <button id="btn-retry">Спробувати ще раз</button>
    </div>
  </div>

  <div id="screen-done">
    <div style="font-size:52px">🎉</div>
    <h2>Skvěle!</h2>
    <p id="done-msg"></p>
    <button id="btn-again2">Ще раз</button>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div id="forms-panel">
  <button id="btn-close-forms">×</button>
  <h3>Tvary slovesa být</h3>
  <table class="forms-table">
    <tr><td>já</td><td>jsem</td><td>nejsem</td></tr>
    <tr><td>ty</td><td>jsi / jseš</td><td>nejsi</td></tr>
    <tr><td>on/ona/ono</td><td>je</td><td>není</td></tr>
    <tr><td>my</td><td>jsme</td><td>nejsme</td></tr>
    <tr><td>vy</td><td>jste</td><td>nejste</td></tr>
    <tr><td>oni/ony/ona</td><td>jsou</td><td>nejsou</td></tr>
  </table>
  <div id="forms-after-dead">
    <p>Готовий/а до практики?</p>
    <button id="btn-to-practice">Іду на тренування →</button>
  </div>
</div>

  {s:"My ___ spokojení.",v:"být",a:"jsme",hint:"my",tr:"Ми задоволені."},
  {s:"Vy ___ z Ostravy?",v:"být",a:"jste",hint:"vy",tr:"Ви з Острави?"},
  {s:"Oni ___ v práci.",v:"být",a:"jsou",hint:"oni",tr:"Вони на роботі."},

  {s:"Ty ___ student češtiny?",v:"nebýt",a:"nejsi",hint:"ty",tr:"Ти не студент чеської?"},
  {s:"Ona ___ doma.",v:"nebýt",a:"není",hint:"ona",tr:"Її немає вдома."},

  {s:"Vy ___ tady poprvé?",v:"být",a:"jste",hint:"vy",tr:"Ви тут вперше?"},
  {s:"Oni ___ hotovi.",v:"být",a:"jsou",hint:"oni",tr:"Вони готові."},
  {s:"Já ___ šťastný.",v:"být",a:"jsem",hint:"já",tr:"Я щасливий."},
  {s:"Ty ___ unavený z cesty?",v:"nebýt",a:"nejsi",hint:"ty",tr:"Ти не втомився з дороги?"},
  {s:"On ___ v restauraci.",v:"být",a:"je",hint:"on",tr:"Він у ресторані."},
  {s:"Ty ___ první ve třídě?",v:"být",a:"jsi",hint:"ty",tr:"Ти перший у класі?"},
  {s:"Toto město ___ velmi hezké.",v:"být",a:"je",hint:"ono",tr:"Це місто дуже гарне."},
  {s:"My ___ připraveni na test.",v:"nebýt",a:"nejsme",hint:"my",tr:"Ми не готові до тесту."},
  {s:"Vy ___ ve třídě?",v:"nebýt",a:"nejste",hint:"vy",tr:"Вас немає в класі?"},
  {s:"Všichni studenti ___ tady dnes.",v:"být",a:"jsou",hint:"oni",tr:"Усі студенти сьогодні тут."},
  {s:"Kamarádka ___ doma.",v:"nebýt",a:"není",hint:"ona",tr:"Подруги немає вдома."},

  {s:"Ona ___ velmi veselá dnes.",v:"být",a:"je",hint:"ona",tr:"Вона сьогодні дуже весела."},

  {s:"Oběd ___ za chvíli hotový.",v:"být",a:"je",hint:"on",tr:"Обід буде готовий за хвилину."},
  {s:"Ty ___ rád, že jsi tady?",v:"být",a:"jsi",hint:"ty",tr:"Ти радий, що ти тут?"},
];

const SET_SIZE=15,MAX_H=3;
let pool=[],cur=[],idx=0,hearts=3,errors=0,checked=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function show(id){['screen-home','screen-train','screen-dead','screen-done'].forEach(s=>document.getElementById(s).style.display=s===id?'flex':'none')}

function startGame(){
  pool=shuffle([...ALL]);cur=pool.slice(0,SET_SIZE);
  idx=0;hearts=MAX_H;errors=0;checked=false;
  show('screen-train');updateHearts();loadSentence();
}

function loadSentence(){
  checked=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('transl-text').style.display='none';
  document.getElementById('transl-text').textContent='';
  document.getElementById('btn-transl').style.display='';
  document.getElementById('btn-check').textContent='Перевірити';
  updateProgress();
  const s=cur[idx];
  const parts=s.s.split('___');
  const disp=document.getElementById('sent-display');
  disp.innerHTML='';

  if(parts[0]){const sp=document.createElement('span');sp.textContent=parts[0];disp.appendChild(sp);}

  const wrap=document.createElement('span');wrap.className='inline-input-wrap';
  const inp=document.createElement('input');
  inp.id='ans-input';inp.type='text';inp.autocomplete='off';inp.spellcheck=false;inp.placeholder='...';
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
  wrap.appendChild(inp);
  const vh=document.createElement('span');vh.className='verb-hint';vh.textContent='('+s.v+')';wrap.appendChild(vh);
  disp.appendChild(wrap);

  if(parts[1]){const sp=document.createElement('span');sp.textContent=parts[1].trimEnd();disp.appendChild(sp);}

  const hb=document.createElement('span');
  hb.className='hint-btn';hb.textContent='?';
  hb.onclick=function(){
    if(hb.classList.contains('open')){hb.textContent='?';hb.classList.remove('open');}
    else{hb.textContent=s.hint;hb.classList.add('open');}
  };
  disp.appendChild(hb);

  setTimeout(()=>inp.focus(),50);
}

function updateProgress(){document.getElementById('prog').style.width=(idx/SET_SIZE*100)+'%'}
function updateHearts(){let h='';for(let i=0;i<hearts;i++)h+='❤️';for(let i=hearts;i<MAX_H;i++)h+='🖤';document.getElementById('hearts').textContent=h}
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ')}

function checkAnswer(){
  if(checked){next();return;}
  const inp=document.getElementById('ans-input');
  const val=norm(inp.value);
  const s=cur[idx];
  const ok=[s.a,...(s.a==='jsi'?['jseš']:[])].includes(val);
  inp.className=ok?'ok':'err';inp.readOnly=true;
  document.getElementById('transl-text').textContent=s.tr;
  document.getElementById('transl-text').style.display='block';
  document.getElementById('btn-transl').style.display='none';
  if(ok){document.getElementById('feedback').textContent='✓ Správně!';}
  else{
    document.getElementById('feedback').textContent='✗ Správně: '+s.a;
    hearts--;errors++;updateHearts();
    if(hearts<=0){setTimeout(()=>show('screen-dead'),700);return;}
  }
  checked=true;document.getElementById('btn-check').textContent='Далі →';
}

function next(){
  idx++;
  if(idx>=SET_SIZE){
    document.getElementById('prog').style.width='100%';
    document.getElementById('done-msg').textContent=errors===0?'Perfektní — жодної помилки! 🏆':'Готово! Помилок: '+errors;
    show('screen-done');return;
  }
  loadSentence();
}

function showForms(ad){document.getElementById('forms-after-dead').style.display=ad?'block':'none';document.getElementById('forms-panel').style.display='block';document.getElementById('overlay').style.display='block'}
function hideForms(){document.getElementById('forms-panel').style.display='none';document.getElementById('overlay').style.display='none'}

document.getElementById('btn-start').onclick=startGame;
document.getElementById('btn-check').onclick=checkAnswer;
document.getElementById('btn-repeat').onclick=()=>showForms(false);
document.getElementById('btn-close-forms').onclick=hideForms;
document.getElementById('overlay').onclick=hideForms;
document.getElementById('btn-see-forms').onclick=()=>showForms(true);
document.getElementById('btn-retry').onclick=startGame;
document.getElementById('btn-to-practice').onclick=()=>{hideForms();startGame()};
document.getElementById('btn-again2').onclick=startGame;
document.getElementById('btn-transl').onclick=function(){
  const s=cur[idx];if(!s)return;
  document.getElementById('transl-text').textContent=s.tr;
  document.getElementById('transl-text').style.display='block';
  document.getElementById('btn-transl').style.display='none';
};
</script>
